# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# sys.path path to prepend to sys.path (needed to find app modules)
prepend_syspath = .

# template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# database connection URL (overridden in env.py using settings)
sqlalchemy.url = mysql+aiomysql://mindspace_user:mindspace_password_v1@localhost/mindspace_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
