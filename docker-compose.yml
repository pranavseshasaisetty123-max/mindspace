version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: mindspace_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_v1
      MYSQL_DATABASE: mindspace_db
      MYSQL_USER: mindspace_user
      MYSQL_PASSWORD: mindspace_password_v1
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password_v1" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: mindspace_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    environment:
      - DATABASE_URL=mysql+aiomysql://mindspace_user:mindspace_password_v1@db:3306/mindspace_db
      - JWT_SECRET_KEY=99a7707e7b6d194ee44e3962b9a76d8b3687e14d48d0859560f7df8f8a1a3641
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
